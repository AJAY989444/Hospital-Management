# ==========================================
# Server Configuration
# ==========================================
server.port=${PORT:8080}

# ==========================================
# Database Configuration (MySQL)
# ==========================================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:hospital_db}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${DB_USER:root}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:password}}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hikari Connection Pool Settings (Optimized for free tier database limits)
spring.datasource.hikari.maximum-pool-size=2
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=10000
spring.datasource.hikari.max-lifetime=30000

# JPA / Hibernate Configurations
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ==========================================
# Spring Security & JWT Configurations
# ==========================================
# Secret key: base64-encoded 256-bit key. Set via env JWT_SECRET in production.
jwt.secret=${JWT_SECRET:U2VjdXJlSG9zcGl0YWxNYW5hZ2VtZW50U3lzdGVtS2V5MjAyNg==}
# Access Token lifetime: 15 minutes (900000 ms)
jwt.access-expiration-ms=900000
# Refresh Token lifetime: 7 days (604800000 ms)
jwt.refresh-expiration-ms=604800000

# ==========================================
# Google Gemini API Configurations
# ==========================================
gemini.api.key=${GEMINI_API_KEY:}
gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent

# ==========================================
# Logging Configuration
# ==========================================
logging.level.org.springframework.security=INFO
logging.level.com.hospital.management=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# ==========================================
# Thymeleaf Configuration
# ==========================================
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
