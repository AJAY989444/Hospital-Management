<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Hospital Management - Login</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <style>
        .error-message {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid var(--danger);
            color: var(--danger);
            padding: 0.75rem;
            border-radius: 8px;
            margin-bottom: 1.25rem;
            display: none;
            font-size: 0.9rem;
        }
    </style>
</head>
<body class="auth-wrapper">

    <div class="card auth-card">
        <div class="auth-header">
            <h1>Care<span>Flow</span></h1>
            <p style="color: var(--text-muted); margin-top: 0.25rem;">Hospital Management Portal</p>
        </div>

        <div id="errorMessage" class="error-message"></div>

        <form id="loginForm">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" class="form-control" placeholder="enter your email" required autocomplete="username">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" class="form-control" placeholder="••••••••" required autocomplete="current-password">
            </div>

            <button type="submit" class="btn-primary" style="margin-top: 1rem;">Login</button>
        </form>

        <div class="auth-footer-text">
            Don't have an account? <a th:href="@{/register}">Register here</a>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.style.display = 'none';

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                if (response.ok) {
                    // Successful login sets HTTP-only cookie, redirect to landing checker "/"
                    window.location.href = '/';
                } else {
                    let errorMessage = 'Invalid email or password';
                    try {
                        const data = await response.json();
                        if (data.error) errorMessage = data.error;
                    } catch (pErr) {}
                    errorDiv.textContent = errorMessage;
                    errorDiv.style.display = 'block';
                }
            } catch (err) {
                errorDiv.textContent = 'Server connection failed';
                errorDiv.style.display = 'block';
            }
        });
    </script>
</body>
</html>
